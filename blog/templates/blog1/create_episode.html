{%extends 'navs/nav.html'%}
{%load static%}

{%block title%}New Episode — Bloggarian{%endblock%}

{%block extra_css%}
<link href="https://cdn.quilljs.com/1.3.7/quill.bubble.css" rel="stylesheet">
<style>
.ink-write-page { background: var(--bg); }

.ink-write-bar {
    position: sticky;
    top: var(--nav-h);
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    height: 50px;
}

.ink-draft-tag {
    font-size: 13px;
    color: var(--text-3);
    display: flex;
    align-items: center;
    gap: 6px;
}

.ink-draft-tag::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    flex-shrink: 0;
}

.ink-pub-btn {
    padding: 7px 22px;
    background: var(--gold);
    color: #0A0A0A;
    border: none;
    border-radius: 20px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
}
.ink-pub-btn:hover { background: var(--gold-d); }

.ink-discard-btn {
    font-size: 13px;
    color: var(--text-3);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    padding: 6px 10px;
    border-radius: var(--r);
    transition: color 0.15s;
    text-decoration: none;
}
.ink-discard-btn:hover { color: var(--danger); }

.ink-write-canvas {
    max-width: 720px;
    margin: 0 auto;
    padding: 52px 24px 100px;
}

/* Series breadcrumb */
.ink-series-crumb {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-3);
    margin-bottom: 36px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.ink-series-crumb span {
    color: var(--gold);
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
}

/* Episode title */
#id_title {
    display: block;
    width: 100%;
    background: transparent !important;
    border: none !important;
    border-bottom: 1px solid var(--border) !important;
    outline: none !important;
    box-shadow: none !important;
    font-family: 'DM Serif Display', Georgia, serif !important;
    font-size: 36px !important;
    font-weight: 400 !important;
    color: var(--text-1) !important;
    line-height: 1.25 !important;
    padding: 0 0 18px !important;
    margin-bottom: 40px;
}
#id_title::placeholder { color: var(--text-3) !important; }
#id_title:focus { border-bottom-color: var(--gold) !important; }

/* Hidden textarea */
#id_article { display: none !important; }

/* Quill */
.ink-quill-outer { min-height: 400px; }

.ql-container.ql-bubble {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 19px;
    color: var(--text-1);
    border: none !important;
}

.ql-editor {
    padding: 0;
    line-height: 1.85;
    min-height: 360px;
}

.ql-editor p { margin-bottom: 1em; }

.ql-editor.ql-blank::before {
    font-style: normal !important;
    color: var(--text-3) !important;
    left: 0 !important;
}

.ql-bubble .ql-tooltip {
    background: var(--bg-1) !important;
    border: 1px solid var(--border-2) !important;
    border-radius: var(--r) !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
}
.ql-bubble .ql-tooltip-arrow { border-bottom-color: var(--border-2) !important; }
.ql-bubble .ql-stroke { stroke: var(--text-2) !important; }
.ql-bubble .ql-fill { fill: var(--text-2) !important; }
.ql-bubble .ql-picker-label { color: var(--text-2) !important; }
.ql-bubble button:hover .ql-stroke,
.ql-bubble .ql-active .ql-stroke { stroke: var(--gold) !important; }
.ql-bubble button:hover .ql-fill,
.ql-bubble .ql-active .ql-fill { fill: var(--gold) !important; }

.ql-editor blockquote {
    border-left: 3px solid var(--gold);
    margin: 1.5em 0;
    padding-left: 20px;
    color: var(--text-2);
    font-style: italic;
}
</style>
{%endblock%}

{%block content%}
<div class="ink-write-page">
    <form id="episode-form" method="POST" action="">
        {%csrf_token%}

        <div class="ink-write-bar">
            <span class="ink-draft-tag">New episode</span>
            <div style="display:flex; align-items:center; gap:10px;">
                <a href="javascript:history.back()" class="ink-discard-btn">Cancel</a>
                <button type="submit" class="ink-pub-btn">Publish Episode</button>
            </div>
        </div>

        <div class="ink-write-canvas">

            <div class="ink-series-crumb">
                Series <i class="bi bi-chevron-right" style="font-size:10px;"></i> <span>{{title}}</span>
            </div>

            {{form.title}}

            {{form.article}}

            <div class="ink-quill-outer">
                <div id="quill-editor"></div>
            </div>

        </div>
    </form>
</div>
{%endblock%}

{%block scripts%}
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>
    var titleEl = document.getElementById('id_title');
    if (titleEl) titleEl.placeholder = 'Episode title...';

    var quill = new Quill('#quill-editor', {
        theme: 'bubble',
        placeholder: 'Write this episode...',
        modules: {
            toolbar: [
                [{ header: [2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                ['blockquote', 'code-block'],
                ['link'],
                [{ list: 'ordered' }, { list: 'bullet' }],
                ['clean']
            ]
        }
    });

    document.getElementById('episode-form').addEventListener('submit', function () {
        document.getElementById('id_article').value = quill.root.innerHTML;
    });
</script>
{%endblock%}
